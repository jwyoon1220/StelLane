name: Auto Release on Version Tag

on:
  push:
    branches:
      - '**'

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.extract.outputs.version }}
      tag: ${{ steps.extract.outputs.tag }}
      should_release: ${{ steps.check.outputs.should_release }}
    steps:
      - name: Extract version from commit message
        id: extract
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          VERSION=$(echo "$COMMIT_MSG" | grep -oP '(?i)\b(?:B|R)\d+\.\d+\.\d+\b|\b(?:Release|Beta)\s+(?:B|R)\d+\.\d+\.\d+\b' | head -1 | sed -E 's/^([Rr][Ee][Ll][Ee][Aa][Ss][Ee]|[Bb][Ee][Tt][Aa])[[:space:]]+//')
          if [ -n "$VERSION" ]; then
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
            echo "tag=$VERSION" >> "$GITHUB_OUTPUT"
            echo "Found version: $VERSION"
          else
            echo "No version found in commit message."
          fi

      - name: Check if release already exists
        id: check
        if: steps.extract.outputs.version != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.extract.outputs.tag }}"
          if gh release view "$TAG" --repo "${{ github.repository }}" > /dev/null 2>&1; then
            echo "Release $TAG already exists — skipping."
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          else
            echo "Release $TAG does not exist — will build and release."
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          fi

  build-and-release:
    needs: check-version
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Build deploy artifact
        shell: cmd
        run: gradlew.bat :app:deploy

      - name: Zip dist folder
        run: |
          $version = "${{ needs.check-version.outputs.version }}"
          Compress-Archive -Path dist\* -DestinationPath "StelLane-$version.zip"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $version = "${{ needs.check-version.outputs.version }}"
          $tag     = "${{ needs.check-version.outputs.tag }}"
          $notes   = "Automated release for version $version"
          gh release create "$tag" `
            --repo "${{ github.repository }}" `
            --title "StelLane $version" `
            --notes "$notes" `
            "StelLane-$version.zip"
